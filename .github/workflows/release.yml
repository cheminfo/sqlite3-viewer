name: Release

# Hand-written because `zakodium/workflows/release.yml@release-v1` is not
# monorepo-aware: it reads the root `package.json` and runs `npm publish`
# from the repo root, which is wrong for a workspaces setup with two
# publishable packages (`backend/` and `frontend/`).
#
# Once `zakodium/workflows` exposes a monorepo mode (see the matching PR),
# this file should be replaced by a one-line `uses:` of the shared workflow.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_backend:
        description: 'Publish sqlite3-viewer-backend'
        type: boolean
        default: false
      publish_frontend:
        description: 'Publish sqlite3-viewer-frontend'
        type: boolean
        default: false

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      any_released: ${{ steps.release.outputs.releases_created }}
      backend_released: ${{ steps.release.outputs['backend--release_created'] }}
      frontend_released: ${{ steps.release.outputs['frontend--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.BOT_TOKEN }}

  publish:
    needs: [release-please]
    if: |
      always() &&
      (
        (needs.release-please.result == 'success' && needs.release-please.outputs.any_released == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: sqlite3-viewer-backend
            released: ${{ needs.release-please.outputs.backend_released || inputs.publish_backend }}
          - workspace: sqlite3-viewer-frontend
            released: ${{ needs.release-please.outputs.frontend_released || inputs.publish_frontend }}
    name: publish-${{ matrix.workspace }}
    steps:
      - uses: actions/checkout@v6
        if: ${{ matrix.released == 'true' }}
      - uses: actions/setup-node@v6
        if: ${{ matrix.released == 'true' }}
        with:
          node-version: 24.x
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
        if: ${{ matrix.released == 'true' }}
      - run: npm publish --no-ignore-scripts --access public -w ${{ matrix.workspace }}
        if: ${{ matrix.released == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_BOT_TOKEN }}
